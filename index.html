                非合夫
            </button>
            <button id="coupleTab" class="px-6 py-3 text-lg font-semibold text-gray-600 hover:text-primary transition-colors">
                合夫
            </button>
        </div>

        <!-- 单人测算表单 -->
        <div id="singleForm" class="bg-white rounded-lg shadow-xl p-8 mb-8">
            <h2 class="text-2xl font-bold text-dark mb-6 text-center">个人姓名测算</h2>
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-dark font-semibold mb-2">姓氏</label>
                    <input type="text" id="surname" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary" placeholder="请填写你的姓氏">
                </div>
                <div>
                    <label class="block text-dark font-semibold mb-2">名字</label>
                    <input type="text" id="givenName" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary" placeholder="请填写您的名字">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-dark font-semibold mb-2">性别</label>
                    <div class="flex space-x-8">
                        <label class="flex items-center">
                            <input type="radio" name="gender" value="male" checked class="mr-2 text-primary focus:ring-primary">
                            <span>男</span>
                        </label>
                        <label class="flex items-center">
                            <input type="radio" name="gender" value="female" class="mr-2 text-primary focus:ring-primary">
                            <span>女</span>
                        </label>
                    </div>
                </div>
            </div>
            <button id="calculateSingleBtn" class="w-full mt-6 bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-lg transition-colors text-lg shadow-lg">
                立即测算
            </button>
        </div>

        <!-- 合夫测算表单 -->
        <div id="coupleForm" class="bg-white rounded-lg shadow-xl p-8 mb-8 hidden">
            <h2 class="text-2xl font-bold text-dark mb-6 text-center">夫妻姓名合婚测算</h2>
            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-light/50 p-6 rounded-lg">
                    <h3 class="text-xl font-semibold text-primary mb-4 text-center">男方信息</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-dark font-semibold mb-2">姓氏</label>
                            <input type="text" id="maleSurname" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary" placeholder="请填写男方姓氏">
                        </div>
                        <div>
                            <label class="block text-dark font-semibold mb-2">名字</label>
                            <input type="text" id="maleGivenName" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary" placeholder="请填写男方名字">
                        </div>
                    </div>
                </div>
                <div class="bg-light/50 p-6 rounded-lg">
                    <h3 class="text-xl font-semibold text-primary mb-4 text-center">女方信息</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-dark font-semibold mb-2">姓氏</label>

                        <div>

                    </div>
                </div>

        </div>

            <h2 class="text-2xl font-bold text-dark mb-6 text-center">测算结果</h2>
            <div id="resultContent"></div>

        // 创建格对象
        function createGridObject(num) {
            // 超过81的数取余数，81归1
            const fortuneNum = num % 81 === 0 ? 81 : num % 81;
            
            return {
                num: num,
                element: getElement(num),
                yinYang: getYinYang(num),
                fortune: fortune81[fortuneNum]
            };
        }

        // 计算三才配置
        function calculateThreeTalents(tianGe, renGe, diGe) {
            const key = getElement(tianGe) + getElement(renGe) + getElement(diGe);
            return {
                config: key,
                fortune: threeTalents[key] || { "level": "未知", "desc": "暂无此三才配置的详细解析" }

        // 计算姓名合婚
        function calculateCoupleMatch(maleSurname, maleGivenName, femaleSurname, femaleGivenName) {
            const male = calculateTenGrids(maleSurname, maleGivenName);
            const female = calculateTenGrids(femaleSurname, femaleGivenName);
            
            // 五行生克关系
            const shengKe = {
                "木": { "生": "火", "克": "土" },
                "火": { "生": "土", "克": "金" },
                "土": { "生": "金", "克": "水" },
                "金": { "生": "水", "克": "木" },
                "水": { "生": "木", "克": "火" }
            };
            
            // 性格匹配度（人格五行）
            let personalityMatch = 0;
            if (male.renGe.element === female.renGe.element) personalityMatch = 70;
            else if (shengKe[male.renGe.element].生 === female.renGe.element) personalityMatch = 85;
            else if (shengKe[female.renGe.element].生 === male.renGe.element) personalityMatch = 75;
            else if (shengKe[male.renGe.element].克 === female.renGe.element) personalityMatch = 40;
            else if (shengKe[female.renGe.element].克 === male.renGe.element) personalityMatch = 30;
            
            // 笔画匹配度（总格差）
            const diff = Math.abs(male.zongGe.num - female.zongGe.num);
            const strokeMatch = diff <= 2 ? 90 : diff <= 5 ? 75 : diff <= 8 ? 60 : 40;
            
            // 综合得分
            const totalScore = Math.round(personalityMatch * 0.6 + strokeMatch * 0.4);
            const matchLevel = totalScore >= 85 ? "天作之合" : totalScore >= 70 ? "佳偶天成" : 
                              totalScore >= 60 ? "情投意合" : totalScore >= 50 ? "需要磨合" : "不太合适";
            
            return { male, female, personalityMatch, strokeMatch, totalScore, matchLevel };
        }
