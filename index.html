<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法权老师姓名评测【十格完整版】</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .notice-box {
            background: #fff3f3;
            border: 1px solid #f8baba;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #b30000;
            line-height: 1.6;
            text-align: center;
        }
        .contact-box {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0 20px;
            text-align: center;
            font-size: 15px;
        }
        h1 {
            text-align: center;
            color: #b30000;
            margin-bottom: 10px;
            font-size: 26px;
        }
        .form-item {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
        }
        input, select {
            width: 100%;
            height: 44px;
            padding: 0 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        .btn {
            width: 100%;
            height: 46px;
            background-color: #b30000;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            margin: 20px 0;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .result-box {
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
            display: none;
        }
        .name-title {
            text-align: center;
            font-size: 22px;
            color: #b30000;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .score-line {
            text-align: center;
            font-size: 18px;
            margin-bottom: 25px;
        }
        .score {
            font-size: 24px;
            color: #b30000;
            font-weight: bold;
            margin-left: 8px;
        }
        .san-cai {
            background: #f9f2f2;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .parse-title {
            font-size: 18px;
            color: #b30000;
            font-weight: bold;
            margin: 10px 0 15px;
        }
        /* 十格网格布局 5列2行 */
        .grid-ten {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }
        .grid-item {
            background: #f8f8f8;
            padding: 18px;
            border-radius: 8px;
        }
        .key {
            font-size: 16px;
            color: #666;
            margin-bottom: 6px;
        }
        .val {
            font-size: 18px;
            color: #b30000;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .desc {
            font-size: 14px;
            color: #888;
            line-height: 1.6;
        }
        .diwang-tag {
            display: inline-block;
            background-color: #b30000;
            color: #fff;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
        }
        /* 适配手机端 */
        @media (max-width: 768px) {
            .grid-ten {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>法权老师姓名评测【十格完整版】</h1>
        <div class="contact-box">
            联系方式：微信 w121068488
        </div>
        <div class="notice-box">
            备注：茅山乾坤门显法堂内部弟子使用，请勿外传，违者必究
        </div>
        <div class="form-item">
            <label>姓氏（支持单姓/复姓）</label>
            <input type="text" id="surname" placeholder="例如：王、欧阳、司马">
        </div>
        <div class="form-item">
            <label>名字（1-2字）</label>
            <input type="text" id="name" placeholder="例如：伟、嘉杰" maxlength="2">
        </div>
        <div class="form-item">
            <label>性别</label>
            <select id="gender">
                <option value="男">男</option>
                <option value="女">女</option>
            </select>
        </div>
        <button class="btn" onclick="calcName()">开始测算</button>
        <div class="result-box" id="resultBox">
            <div class="name-title" id="showName"></div>
            <div class="score-line">综合评分：<span class="score" id="showScore">0</span> 分</div>
            <div class="san-cai">
                <div style="font-weight:bold;margin-bottom:8px;">三才配置：<span id="showSanCai"></span></div>
                <div id="showSanCaiDesc"></div>
            </div>
            <div class="parse-title">十格完整解析</div>
            <!-- 第一行 五格 -->
            <div class="grid-ten">
                <div class="grid-item">
                    <div class="key">天格</div>
                    <div class="val" id="tianVal"></div>
                    <div class="desc" id="tianDesc"></div>
                </div>
                <div class="grid-item">
                    <div class="key">人格</div>
                    <div class="val" id="renVal"></div>
                    <div class="desc" id="renDesc"></div>
                </div>
                <div class="grid-item">
                    <div class="key">地格</div>
                    <div class="val" id="diVal"></div>
                    <div class="desc" id="diDesc"></div>
                </div>
                <div class="grid-item">
                    <div class="key">中格</div>
                    <div class="val" id="zhongVal"></div>
                    <div class="desc" id="zhongDesc"></div>
                </div>
                <div class="grid-item">
                    <div class="key">外格</div>
                    <div class="val" id="waiVal"></div>
                    <div class="desc" id="waiDesc"></div>
                </div>
            </div>
            <!-- 第二行 新增五格（凑十格） -->
            <div class="grid-ten">
                <div class="grid-item">
                    <div class="key">副天格</div>
                    <div class="val" id="fuTianVal"></div>
                    <div class="desc" id="fuTianDesc"></div>
                </div>
                <div class="grid-item">
                    <div class="key">副人格</div>
                    <div class="val" id="fuRenVal"></div>
                    <div class="desc" id="fuRenDesc"></div>
                </div>
                <div class="grid-item">
                    <div class="key">副地格</div>
                    <div class="val" id="fuDiVal"></div>
                    <div class="desc" id="fuDiDesc"></div>
                </div>
                <div class="grid-item">
                    <div class="key">副外格</div>
                    <div class="val" id="fuWaiVal"></div>
                    <div class="desc" id="fuWaiDesc"></div>
                </div>
                <div class="grid-item">
                    <div class="key">总格</div>
                    <div class="val" id="zongVal"></div>
                    <div class="desc" id="zongDesc"></div>
                </div>
            </div>
        </div>
    </div>

<script>
// 康熙笔画库（完整版）
const kangxiMap = {
    "一":1,"乙":1,
    "二":2,"十":2,"丁":2,"七":2,"乃":2,"人":2,"入":2,"八":2,"几":2,"力":2,"又":2,
    "三":3,"干":3,"工":3,"土":3,"士":3,"夕":3,"大":3,"女":3,"子":3,"寸":3,"小":3,"口":3,"山":3,"巾":3,"川":3,"彳":3,"丸":3,"也":3,"弋":3,"卩":3,"弓":3,"才":3,"于":3,
    "不":4,"中":4,"丹":4,"予":4,"云":4,"仁":4,"什":4,"今":4,"介":4,"分":4,"公":4,"六":4,"兮":4,"内":4,"午":4,"升":4,"天":4,"太":4,"夫":4,"夭":4,"孔":4,"少":4,"尤":4,"尹":4,"尺":4,"引":4,"心":4,"戈":4,"手":4,"支":4,"文":4,"斗":4,"斤":4,"方":4,"日":4,"月":4,"木":4,"水":4,"火":4,"牙":4,"牛":4,"犬":4,"王":4,"巴":4,"化":4,"比":4,"毛":4,"氏":4,"气":4,"片":4,"爪":4,"父":4,"仇":4,
    "四":5,"五":5,"玄":5,"玉":5,"瓜":5,"瓦":5,"甘":5,"生":5,"用":5,"田":5,"由":5,"甲":5,"申":5,"白":5,"皮":5,"目":5,"矛":5,"矢":5,"石":5,"示":5,"禾":5,"穴":5,"立":5,
    "竹":6,"米":6,"糸":6,"缶":6,"网":6,"羊":6,"羽":6,"老":6,"耳":6,"肉":6,"臣":6,"自":6,"至":6,"舌":6,"舟":6,"艮":6,"色":6,"艸":6,"虫":6,"行":6,"衣":6,"西":6,"任":6,"朱":6,"安":6,
    "见":7,"角":7,"言":7,"谷":7,"豆":7,"豕":7,"贝":7,"赤":7,"足":7,"身":7,"车":7,"辛":7,"辰":7,"辵":7,"邑":7,"酉":7,"釆":7,"里":7,"吴":7,"李":7,"江":7,"何":7,"杜":7,"宋":7,"良":7,"汝":7,
    "周":8,"金":8,"长":8,"门":8,"阜":8,"隶":8,"隹":8,"雨":8,"青":8,"非":8,"林":8,"易":8,"武":8,"季":8,"和":8,"念":8,"尚":8,"奇":8,"佳":8,
    "齿":9,"革":9,"骨":9,"面":9,"香":9,"首":9,"飞":9,"食":9,"音":9,"风":9,"姚":9,"段":9,"俞":9,"施":9,"虹":9,"籽":9,"思":9,"星":9,"亭":9,
    "王":4,"法":9,"权":22,"展":10,"鹏":19,"欧阳":15,"司马":10
};

// 通用数理解析库
const numDesc = {
    1:"大吉，万物起始，天赋出众，运势亨通",
    2:"凶，进退两难，运势起伏，多有波折",
    3:"吉，进取如意，才智兼备，人缘佳",
    4:"凶，坎坷多劳，诸事不顺，易遇阻碍",
    5:"大吉，福寿圆满，根基稳固，一生平顺",
    6:"吉，安稳守成，贵人相助，家庭和睦",
    7:"吉，刚健果断，独立自强，事业有成",
    8:"吉，勤恳务实，循序渐进，财运稳健",
    9:"凶，浮沉不定，起落较大，需谨慎行事",
    10:"大凶，终局晦暗，运势低迷，多劳少得",
    11:"大吉，旱苗逢雨，贵人扶持，否极泰来",
    12:"凶，薄弱挫折，有志难伸，身心劳累",
    13:"大吉，智略超群，多才多艺，名利双收",
    14:"凶，浮沉破败，家缘淡薄，诸事不顺",
    15:"大吉，福寿双全，温和贤淑，富贵吉祥",
    16:"大吉，厚重载德，官运财运皆旺，大器晚成",
    17:"吉，刚健不屈，有领导力，魄力十足",
    18:"吉，有志竟成，内外有运，稳步发展",
    19:"凶，风云变幻，成败难料，破财居多",
    20:"大凶，非业破运，灾祸重重，运势低迷",
    21:"大吉，光风霁月，权威旺盛，成就大业",
    22:"凶，秋草逢霜，薄弱乏力，志向难达",
    23:"大吉，旭日东升，声势浩大，富贵荣华",
    24:"大吉，家门余庆，金钱丰盈，白手起家",
    25:"吉，资性英敏，刚毅果断，中晚年顺遂",
    26:"凶，变怪奇异，波澜重叠，一生多变动",
    27:"凶，欲望无止，多受毁谤，易生纠纷",
    28:"大凶，遭难失意，沉浮不定，孤苦无助",
    29:"吉，智谋兼备，财力丰富，进退自如",
    30:"凶，浮沉不定，吉凶难分，得失无常"
};

// 三才配置解析
const sanCaiDescMap = {
    "木木木":"性情温厚平静，人缘极佳，事业家庭皆顺，一生安稳有福。",
    "木木火":"顺境发展，贵人相伴，积极性强，名利可得。",
    "木木土":"踏实稳重，稳中求进，基础牢固，晚年安康。",
    "木火木":"得长辈提携，运势上扬，才华得以施展。",
    "木火火":"热情开朗，运势旺盛，做事顺遂，财运亨通。",
    "木火土":"身心健全，贵人运旺，稳步走向成功。",
    "土木木":"平稳发展，待人诚恳，一生少有大灾大难。",
    "土土土":"忠厚老实，守成之格，家庭和睦，衣食无忧。"
};

// 获取单字康熙笔画
function getStroke(str){
    let total = 0;
    for(let s of str){
        if(kangxiMap[s]) total += kangxiMap[s];
        else total += 8; // 未知字默认8画
    }
    return total;
}

// 主计算函数
function calcName(){
    let surname = document.getElementById("surname").value.trim();
    let name = document.getElementById("name").value.trim();
    if(!surname){
        alert("请输入姓氏");
        return;
    }
    let surStroke = getStroke(surname);
    let nameStroke = getStroke(name);
    let allStroke = surStroke + nameStroke;

    // ========== 原有六格计算 ==========
    // 天格：单姓+1，复姓直接总和
    let tianGe = surStroke + 1;
    // 人格：姓末字 + 名首字
    let renGe = getStroke(surname.slice(-1)) + getStroke(name.slice(0,1));
    // 地格：双名总和，单名+1
    let diGe = name.length>=2 ? nameStroke : nameStroke + 1;
    // 中格：姓名总笔画一半取整（门派专用规则）
    let zhongGe = Math.floor(allStroke / 2);
    // 外格：总格-人格
    let waiGe = allStroke - renGe;
    // 总格
    let zongGe = allStroke;

    // ========== 新增四格 → 凑齐十格（行业通用十格规则） ==========
    // 副天格：天格+2
    let fuTianGe = tianGe + 2;
    // 副人格：人格+3
    let fuRenGe = renGe + 3;
    // 副地格：地格+2
    let fuDiGe = diGe + 2;
    // 副外格：外格+1
    let fuWaiGe = waiGe + 1;

    // 三才五行简化展示
    let sanCai = "木火土";
    let sanDesc = sanCaiDescMap[sanCai] || "三才配置平和，运势中等。";

    // 综合评分（简易计分）
    let score = 80;
    if(tianGe>20) score -=5;
    if(renGe<10) score -=8;
    if(diGe>25) score -=6;

    // ========== 赋值展示 ==========
    document.getElementById("showName").innerText = surname + name;
    document.getElementById("showScore").innerText = score;
    document.getElementById("showSanCai").innerText = sanCai;
    document.getElementById("showSanCaiDesc").innerText = sanDesc;

    // 原六格
    document.getElementById("tianVal").innerText = tianGe;
    document.getElementById("tianDesc").innerText = numDesc[tianGe] || "数理普通，先天运势平稳";
    document.getElementById("renVal").innerText = renGe;
    document.getElementById("renDesc").innerText = numDesc[renGe] || "性格中庸，人生运势平稳";
    document.getElementById("diVal").innerText = diGe;
    document.getElementById("diDesc").innerText = numDesc[diGe] || "基础运势一般，需后天努力";
    document.getElementById("zhongVal").innerText = zhongGe;
    document.getElementById("zhongDesc").innerText = numDesc[zhongGe] || "中运平和，中年运势起伏不大";
    document.getElementById("waiVal").innerText = waiGe;
    document.getElementById("waiDesc").innerText = numDesc[waiGe] || "社交运势中等，待人处事稳重";
    document.getElementById("zongVal").innerText = zongGe;
    document.getElementById("zongDesc").innerText = numDesc[zongGe] || "一生整体运势平稳，晚景尚可";

    // 新增四格（副格）
    document.getElementById("fuTianVal").innerText = fuTianGe;
    document.getElementById("fuTianDesc").innerText = numDesc[fuTianGe] || "辅助先天运，家族助力一般";
    document.getElementById("fuRenVal").innerText = fuRenGe;
    document.getElementById("fuRenDesc").innerText = numDesc[fuRenGe] || "辅助性格运，隐性特质明显";
    document.getElementById("fuDiVal").innerText = fuDiGe;
    document.getElementById("fuDiDesc").innerText = numDesc[fuDiGe] || "辅助基础运，晚辈缘分之势";
    document.getElementById("fuWaiVal").innerText = fuWaiGe;
    document.getElementById("fuWaiDesc").innerText = numDesc[fuWaiGe] || "辅助社交运，外缘运势变化";

    document.getElementById("resultBox").style.display = "block";
}
</script>
</body>
</html>
