        };

        const msgBox = document.getElementById('msgBox');
        // 缓存已查询汉字笔画，避免重复请求
        const strokeCache = new Map();

        // 单个汉字在线查询康熙笔画
        async function getKangXiStroke(char) {
            // 非汉字直接返回0
            if (!/^[\u4e00-\u9fa5]$/.test(char)) return 0;
            // 读取缓存
            if (strokeCache.has(char)) return strokeCache.get(char);
            try {
                // 调用公开笔画接口
                const res = await fetch(`https://api.haohao89.com/zi?name=${encodeURIComponent(char)}`);
                const data = await res.json();
                const stroke = Number(data.kangxi) || 0;
                strokeCache.set(char, stroke);
                return stroke;
            } catch (e) {
                msgBox.innerHTML = `<div class="error">网络请求失败，无法查询【${char}】笔画</div>`;
                return 0;
            }
        }

        // 批量获取整串文字笔画
        async function getStrStroke(str) {
            let total = 0;
            for (const ch of str) {
                total += await getKangXiStroke(ch);
            }
            return total;
        }

        // 五行阴阳计算
        function getWY(num){
            let n = num % 10;
            if(n === 0) n = 10;
            let wu = "", yy = "";
            if(n === 1){wu="木";yy="阳";}
            else if(n === 2){wu="木";yy="阴";}
            else if(n === 3){wu="火";yy="阳";}
            else if(n === 4){wu="火";yy="阴";}
            else if(n === 5){wu="土";yy="阳";}
            else if(n === 6){wu="土";yy="阴";}
            else if(n === 7){wu="金";yy="阳";}
            else if(n === 8){wu="金";yy="阴";}
            else if(n === 9){wu="水";yy="阳";}
            else {wu="水";yy="阴";}
            return {wu, yy, str:`${num}（${yy}${wu}）`};
        }

        // 81数理取模
        function get81Num(x){
            let r = x % 80;
            return r === 0 ? 80 : r;
        }

        // 生成卡片HTML
        function buildCardHtml(gridName, num) {
            let detail = num81Detail[get81Num(num)];
            if (!detail) {
                return `<div class="grid-card">
                    <div class="card-header">
                        <div class="card-left">
                            <div class="grid-name">${gridName}</div>
                            <div class="grid-num">${num}</div>
                        </div>
                        <div class="card-right">
                            <div class="title">暂无数据</div>
                        </div>
                    </div>
                </div>`;
            }
            return `
            <div class="grid-card">
                <div class="card-header">
                    <div class="card-left">
                        <div class="grid-name">${gridName}</div>
                        <div class="grid-num">${num}</div>
                    </div>
                    <div class="card-right">
                        <div class="title">
                            ${detail.title}
                            <span class="tag">${detail.tag}</span>
                        </div>
                        <div class="note">${detail.note}</div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="section-item">
                        <span class="section-title base">基业</span>
                        ${detail.base}
                    </div>
                    <div class="section-item">
                        <span class="section-title family">家庭</span>
                        ${detail.family}
                    </div>
                    <div class="section-item">
                        <span class="section-title health">健康</span>
                        ${detail.health}
                    </div>
                    <div class="section-item">
                        <span class="section-title overall">整体</span>
                        ${detail.overall}
                    </div>
                </div>
            </div>`;
        }

        // 主测算逻辑
        async function calcName() {
            const surname = document.getElementById("surname").value.trim();
            const givenName = document.getElementById("givenName").value.trim();
            const resultArea = document.getElementById("resultArea");
            const cardsArea = document.getElementById("cardsArea");
            const nameWrap = document.getElementById("nameWrap");

            msgBox.innerHTML = '';
            resultArea.style.display = "none";

            if (!surname || !givenName) {
                msgBox.innerHTML = `<div class="error">请填写完整的姓氏和名字！</div>`;
                return;
            }

            // 限制最多4个汉字
            let fullName = (surname + givenName).slice(0,4);
            let nameHtml = "";
            for(let ch of fullName){
                nameHtml += `<span class="name-char">${ch}</span>`;
            }
            nameWrap.innerHTML = nameHtml;

            msgBox.innerHTML = `<div class="loading">正在联网查询汉字笔画，请稍候...</div>`;

            const sArr = surname.split("");
            const gArr = givenName.split("");
            const isFuXing = sArr.length === 2;
            const isSingleName = gArr.length === 1;

            // 异步获取每个字笔画
            const s1 = await getKangXiStroke(sArr[0]);
            const s2 = isFuXing ? await getKangXiStroke(sArr[1]) : 0;
            const g1 = await getKangXiStroke(gArr[0]);
            const g2 = isSingleName ? 1 : await getKangXiStroke(gArr[1]);

            // 六格计算
            const tianGe = isFuXing ? (s1 + s2) : (s1 + 1);
            const renGe = isFuXing ? (s2 + g1) : (s1 + g1);
            const diGe = isSingleName ? (g1 + 1) : (g1 + g2);

            let zongGe = 0;
            if (!isFuXing && isSingleName) zongGe = s1 + g1;
            else if (!isFuXing && !isSingleName) zongGe = s1 + g1 + g2;
            else if (isFuXing && isSingleName) zongGe = s1 + s2 + g1;
            else zongGe = s1 + s2 + g1 + g2;

            const waiGe = isSingleName ? 2 : (g2 + 1);
            let bianGe = 0;
            if (!isFuXing && isSingleName) bianGe = s1 + g1;
            else if (!isFuXing && !isSingleName) bianGe = s1 + g2;
            else if (isFuXing && isSingleName) bianGe = s2 + g1;
            else bianGe = s2 + g2;

            // 页面赋值
            document.getElementById("tianGeNum").innerText = tianGe;
            document.getElementById("renGeNum").innerText = renGe;
            document.getElementById("diGeNum").innerText = diGe;

            document.getElementById("tianGeWY").innerText = `(${getWY(tianGe).yy}${getWY(tianGe).wu})`;
            document.getElementById("renGeWY").innerText = `(${getWY(renGe).yy}${getWY(renGe).wu})`;
            document.getElementById("diGeWY").innerText = `(${getWY(diGe).yy}${getWY(diGe).wu})`;

            document.getElementById("waiGeStr").innerText = `${waiGe}（${getWY(waiGe).yy}${getWY(waiGe).wu}）`;
            document.getElementById("bianGeStr").innerText = `${bianGe}（${getWY(bianGe).yy}${getWY(bianGe).wu}）`;
            document.getElementById("zongGeStr").innerText = `${zongGe}（${getWY(zongGe).yy}${getWY(zongGe).wu}）`;

            // 渲染解析卡片
            let html = "";
            html += buildCardHtml("天格", tianGe);
            html += buildCardHtml("人格", renGe);
            html += buildCardHtml("地格", diGe);
            html += buildCardHtml("总格", zongGe);
            html += buildCardHtml("外格", waiGe);
            html += buildCardHtml("中变格", bianGe);
            cardsArea.innerHTML = html;

            msgBox.innerHTML = `<div class="loading">✅ 测算完成</div>`;
