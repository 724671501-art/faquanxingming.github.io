// ====================== 工具函数（完整保留） ======================
// 单字笔画
function getStroke(char) {
    return kangxiMap[char] || 10;
}
// 字符串转笔画数组
function getStrokeArr(str) {
    return str.split('').map(c => getStroke(c));
}
// 获取五行
function getWuxing(num) {
    let last = num % 10;
    return wuxingMap[last] || { wuxing: "未知", yinYang: "未知" };
}
// 获取数理吉凶
function getLuck(num) {
    let n = num > 81 ? num % 81 || 81 : num;
    return luckMap[n] || { level: "未知", desc: "暂无解析" };
}
// 是否帝王数
function isDiwang(num) {
    return diwangSet.has(num);
}
// 获取三才组合 + 吉凶
function getSanCai(tian, ren, di) {
    let tWx = getWuxing(tian).wuxing;
    let rWx = getWuxing(ren).wuxing;
    let dWx = getWuxing(di).wuxing;
    let key = tWx + rWx + dWx;
    return {
        combo: key,
        wxText: `${tWx}（天）-${rWx}（人）-${dWx}（地）`,
        info: sanCaiLuckMap[key] || { level: "未知", desc: "暂无解析" }
    };
}
// 综合评分
function calcScore(tian, ren, di, zhong, wai, zong) {
    let score = 60;
    let list = [
        { val: tian, weight: 0.1 },
        { val: ren, weight: 0.3 },
        { val: di, weight: 0.15 },
        { val: zhong, weight: 0.1 },
        { val: wai, weight: 0.15 },
        { val: zong, weight: 0.2 }
    ];
    list.forEach(item => {
        let lk = getLuck(item.val);
        if (lk.level === "吉") {
            score += 20 * item.weight;
        } else if (lk.level === "半吉") {
            score += 8 * item.weight;
        } else {
            score -= 15 * item.weight;
        }
    });
    score = Math.max(0, Math.min(100, Math.round(score)));
    return score;
}

// ====================== 主计算函数【已修复计算公式】 ======================
function calcName() {
    let surname = document.getElementById('surname').value.trim();
    let name = document.getElementById('name').value.trim();
    // 校验
    if (!surname || !name) {
        alert("请输入完整姓名！");
        return;
    }
    if (name.length < 1 || name.length > 2) {
        alert("名字请输入1-2个字！");
        return;
    }

    // 计算各部分康熙笔画
    let sArr = getStrokeArr(surname);
    let sTotal = sArr.reduce((a,b)=>a+b, 0);
    let nArr = getStrokeArr(name);
    let n1 = nArr[0];
    let n2 = nArr.length >= 2 ? nArr[1] : 0;
    let isTwoName = (n2 > 0); // 判断是否为双字名

    // ========== 【修复后 正统标准计算公式】 ==========
    let tianGe = sTotal + 1;                     // 天格：姓氏笔画 + 1
    let renGe = sTotal + n1;                     // 人格：姓 + 名第一个字
    let diGe  = isTwoName ? (n1 + n2) : (n1 + 1);// 地格：双名=两名字相加，单名=名+1
    let zongGe = sTotal + n1 + n2;               // 总格：姓+全部名字总和
    let waiGe  = isTwoName ? (n2 + 1) : 2;       // 外格：双名=末字+1，单名固定=2
    let zhongGe = diGe;                          // 中格沿用原逻辑 = 地格

    // 三才
    let sanCai = getSanCai(tianGe, renGe, diGe);
    // 综合评分
    let totalScore = calcScore(tianGe, renGe, diGe, zhongGe, waiGe, zongGe);

    // 逐个获取五行、吉凶、帝王数
    function formatVal(num) {
        let wx = getWuxing(num);
        let luck = getLuck(num);
        let diwang = isDiwang(num);
        let diwangHtml = diwang ? `<span class="diwang-tag">帝王数</span>` : "";
        return `${num}（${wx.wuxing}·${luck.level}）${diwangHtml}`;
    }

    // 渲染页面
    document.getElementById('showName').innerText = `姓名：${surname}${name}`;
    document.getElementById('showScore').innerText = totalScore;
    document.getElementById('showSanCai').innerText = `${sanCai.wxText} 【${sanCai.info.level}】`;
    document.getElementById('showSanCaiDesc').innerText = sanCai.info.desc;

    document.getElementById('tianVal').innerHTML = formatVal(tianGe);
    document.getElementById('tianDesc').innerText = getLuck(tianGe).desc;

    document.getElementById('renVal').innerHTML = formatVal(renGe);
    document.getElementById('renDesc').innerText = getLuck(renGe).desc;

    document.getElementById('diVal').innerHTML = formatVal(diGe);
    document.getElementById('diDesc').innerText = getLuck(diGe).desc;

    document.getElementById('zhongVal').innerHTML = formatVal(zhongGe);
    document.getElementById('zhongDesc').innerText = getLuck(zhongGe).desc;

    document.getElementById('waiVal').innerHTML = formatVal(waiGe);
    document.getElementById('waiDesc').innerText = getLuck(waiGe).desc;

    document.getElementById('zongVal').innerHTML = formatVal(zongGe);
    document.getElementById('zongDesc').innerText = getLuck(zongGe).desc;

    // 显示结果区域
    document.getElementById('resultBox').style.display = "block";
}
