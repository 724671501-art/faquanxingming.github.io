            <button id="tabCouple" class="flex-1 py-4 text-lg text-gray-500 hover:main-red transition-all border-none bg-transparent cursor-pointer">合婚测算</button>
        </div>

        <div id="formSingle" class="bg-white rounded-b-xl box-shadow-red p-8 mb-6">
            <div class="grid gap-6">
                <div>
                    <label class="block mb-2 text-lg font-medium main-red">姓氏</label>
                    <input type="text" id="surname" class="w-full border border-main-red rounded-lg px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-mainRed/40" placeholder="简体、繁体、冷门姓氏、生僻字均可">
                </div>
                <div>
                    <label class="block mb-2 text-lg font-medium main-red">名字</label>
                    <input type="text" id="givenName" class="w-full border border-main-red rounded-lg px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-mainRed/40" placeholder="文言字、现代起名字、生僻字均可">
                </div>
            </div>
            <p class="tip-text">提示：已按康熙笔画标准录入全量姓氏与用字</p>
            <button id="btnCalcSingle" class="mt-4 w-full bg-main-red text-white py-4 rounded-lg text-xl hover:opacity-90 transition-all border-none cursor-pointer">开始测算</button>
        </div>

        <div id="formCouple" class="bg-white rounded-xl box-shadow-red p-8 mb-6 hidden">

                <div class="p-6 rounded-lg border border-main-red bg-red-50">
                    <h3 class="text-center text-xl font-medium main-red mb-5">男方姓名</h3>
                    <div class="space-y-4">
                        <input type="text" id="maleSurname" placeholder="男方姓氏" class="w-full border border-main-red rounded-lg px-4 py-3 focus:outline-none">
                        <input type="text" id="maleGivenName" placeholder="男方名字" class="w-full border border-main-red rounded-lg px-4 py-3 focus:outline-none">
                    </div>
                </div>
                <div class="p-6 rounded-lg border border-main-red bg-red-50">
                    <h3 class="text-center text-xl font-medium main-red mb-5">女方姓名</h3>
                    <div class="space-y-4">
                        <input type="text" id="femaleSurname" placeholder="女方姓氏" class="w-full border border-main-red rounded-lg px-4 py-3 focus:outline-none">

                    </div>
                </div>

        function getWuXing(num) {
            let n = num % 10;
            if(n===1||n===2) return "木";
            if(n===3||n===4) return "火";
            if(n===5||n===6) return "土";
            if(n===7||n===8) return "金";
            return "水";
        }

            if (kangxiCharStroke[char]) return kangxiCharStroke[char];

            }
            return total > 0 ? total : 1;
        }

        function getTotalStroke(str) {
            return str.split("").reduce((sum, char) => sum + getSingleStroke(char), 0);
        }

        // 十格算法（后台运行）
        function calcNameGrid(surName, givenName) {
            const surArr = surName.split("");
            const nameArr = givenName.split("");
            const surTotal = getTotalStroke(surName);
            const nameTotal = getTotalStroke(givenName);
            const fullTotal = surTotal + nameTotal;

            let tianGe = surArr.length === 1 ? surTotal + 1 : surTotal;
            const renGe = getSingleStroke(surArr[surArr.length - 1]) + getSingleStroke(nameArr[0]);
            const diGe = nameTotal;
            const waiGe = fullTotal - renGe + 1;
            const zongGe = fullTotal;
            const zhongGe = surTotal + nameTotal;

            return {
                天格: formatNum(tianGe),
                人格: formatNum(renGe),
                地格: formatNum(diGe),
                外格: formatNum(waiGe),
                总格: formatNum(zongGe),
                中格: formatNum(zhongGe),
                三才: [formatNum(tianGe), formatNum(renGe), formatNum(diGe)]
            };
        }

        // 前台渲染（多维度解析）
        function renderResult(fullName, gridData) {
            const t = gridData.天格;
            const r = gridData.人格;
            const d = gridData.地格;
            const z = gridData.总格;
            const w = gridData.外格;
            const sanCai = gridData.三才;

            const tianXing = getWuXing(sanCai[0]);
            const renXing = getWuXing(sanCai[1]);
            const diXing = getWuXing(sanCai[2]);

            // 生成单格解析HTML
            function renderGridItem(gridName, gridNum, gridData) {
                if (!gridData) return "";
                const statusClass = `status-${gridData.status}`;
                return `
                    <div class="grid-card mb-4">
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center">
                                <span class="text-xl font-bold main-red mr-2">${gridName}</span>
                                <span class="text-xl font-bold">${gridNum}</span>
                            </div>
                            <span class="status-tag ${statusClass}">${gridData.status}</span>
                        </div>
                        <h4 class="text-lg font-medium mb-2">${gridData.title}</h4>
                        <p class="text-gray-600 mb-4 bg-yellow-50 p-2 rounded">${gridData.note}</p>
                        <div class="space-y-3">
                            <p><span class="section-tag tag-基业">基业</span>${gridData.base}</p>
                            <p><span class="section-tag tag-家庭">家庭</span>${gridData.family}</p>
                            <p><span class="section-tag tag-健康">健康</span>${gridData.health}</p>
                            <p class="mt-4 text-gray-700 leading-relaxed">${gridData.full}</p>
                        </div>
                    </div>
                `;
            }

            let html = `
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-bold main-red">${fullName}</h2>
                    <p class="text-gray-500 mt-2">五格姓名学 · 专业测算报告</p>
                </div>
                ${renderGridItem("天格（先祖运）", t, numDetail[t])}
                ${renderGridItem("人格（核心主运）", r, numDetail[r])}
                ${renderGridItem("地格（早年运势）", d, numDetail[d])}
                ${renderGridItem("外格（人际副运）", w, numDetail[w])}
                ${renderGridItem("总格（晚年终运）", z, numDetail[z])}
                <div class="p-5 rounded-lg border border-main-red bg-red-50 mt-6">
                    <h3 class="text-lg font-bold main-red mb-3">三才配置</h3>
                    <p class="mb-2"><span class="font-medium">五行组合：</span>${tianXing} ｜ ${renXing} ｜ ${diXing}</p>
                    <p class="text-sm text-gray-600">三才代表天、人、地三者气场组合，主导整体运势、身心健康与人际缘分。</p>
                </div>
            `;
            document.getElementById("resultContent").innerHTML = html;
        }

        // 页面交互
        window.onload = function(){
            const tabSingle = document.getElementById("tabSingle");
            const tabCouple = document.getElementById("tabCouple");
            const formSingle = document.getElementById("formSingle");
            const formCouple = document.getElementById("formCouple");
            const resultBox = document.getElementById("resultBox");
            const btnReset = document.getElementById("btnReset");

            tabSingle.onclick = function(){
                tabSingle.classList.add("tab-active");
                tabCouple.classList.remove("tab-active");
                formSingle.classList.remove("hidden");
                formCouple.classList.add("hidden");
                resultBox.classList.add("hidden");
            };
            tabCouple.onclick = function(){
                tabCouple.classList.add("tab-active");
                tabSingle.classList.remove("tab-active");
                formCouple.classList.remove("hidden");
                formSingle.classList.add("hidden");
                resultBox.classList.add("hidden");
            };

            document.getElementById("btnCalcSingle").onclick = function(){
                let sur = document.getElementById("surname").value.trim();
                let name = document.getElementById("givenName").value.trim();
                if(!sur || !name){
                    alert("请完整输入姓氏和名字！");
                    return;
                }
                let gridData = calcNameGrid(sur, name);
                formSingle.classList.add("hidden");
                resultBox.classList.remove("hidden");
                renderResult(sur + name, gridData);
            };

            document.getElementById("btnCalcCouple").onclick = function(){
                let mSur = document.getElementById("maleSurname").value.trim();
                let mName = document.getElementById("maleGivenName").value.trim();
                let fSur = document.getElementById("femaleSurname").value.trim();
                let fName = document.getElementById("femaleGivenName").value.trim();
                if(!mSur || !mName || !fSur || !fName){
                    alert("请完整填写双方姓名！");
                    return;
                }
                alert("合婚模块暂未完善，敬请期待");
            };

            btnReset.onclick = function(){
                resultBox.classList.add("hidden");
                document.getElementById("surname").value = "";
                document.getElementById("givenName").value = "";
                document.getElementById("maleSurname").value = "";
                document.getElementById("maleGivenName").value = "";
                document.getElementById("femaleSurname").value = "";
                document.getElementById("femaleGivenName").value = "";
                if(tabSingle.classList.contains("tab-active")){
                    formSingle.classList.remove("hidden");
                }else{
                    formCouple.classList.remove("hidden");
                }
            };
        };
    </script>
</body>
</html>
